<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - EcoWise Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="bg-[#131921] text-white px-4 py-3">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="home.html" class="text-2xl font-bold">🌿 EcoWise</a>
      <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">My Account</h1>
    <div class="bg-white rounded-lg shadow p-6" id="accountInfo"></div>
  </div>

  <script>
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    if (!isLoggedIn) window.location.href = 'login.html';
    
    const userName = localStorage.getItem('userName');
    const userEmail = localStorage.getItem('userEmail');
    
    document.getElementById('accountInfo').innerHTML = `
      <div class="space-y-4">
        <div><label class="font-semibold">Name:</label> <span>${userName}</span></div>
        <div><label class="font-semibold">Email:</label> <span>${userEmail}</span></div>
        <div><label class="font-semibold">Member Since:</label> <span>${new Date().toLocaleDateString()}</span></div>
        <hr class="my-4"><a href="orders.html" class="inline-block bg-[#ff9900] text-black px-4 py-2 rounded">View My Orders</a>
      </div>
    `;
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userName');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
