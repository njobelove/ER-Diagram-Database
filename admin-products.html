<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management - EcoWise Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <!-- Admin Header -->
  <div class="bg-[#131921] text-white px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3">
      <i class="fab fa-amazon text-2xl text-[#ff9900]"></i>
      <span class="font-bold">EcoWise Admin</span>
    </div>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
  </div>

  <div class="flex">
    <aside class="w-72 bg-white min-h-screen p-4 shadow">
      <a href="admin-dashboard.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Dashboard</a>
      <a href="admin-products.html" class="block px-3 py-2 rounded bg-[#232f3e] text-white mt-1">Products</a>
      <a href="admin-orders.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100 mt-1">Orders</a>
      <a href="admin-customers.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100 mt-1">Customers</a>
      <a href="admin-reports.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100 mt-1">Reports</a>
    </aside>

    <main class="flex-1 p-8">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold">Product Management</h1>
        <button onclick="openProductModal()" class="bg-[#ff9900] px-4 py-2 rounded font-semibold hover:bg-[#fa8900]">
          <i class="fas fa-plus mr-1"></i> Add Product
        </button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr><th class="px-6 py-3 text-left">SKU</th><th>Name</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="productsTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <div class="flex justify-between mb-4"><h2 id="modalTitle" class="text-xl font-bold">Add Product</h2><button onclick="closeProductModal()" class="text-gray-500">&times;</button></div>
      <form id="productForm" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        <input type="text" id="sku" placeholder="SKU" class="w-full border rounded p-2 mb-3" required>
        <input type="text" id="name" placeholder="Product Name" class="w-full border rounded p-2 mb-3" required>
        <input type="number" id="price" placeholder="Price" step="0.01" class="w-full border rounded p-2 mb-3" required>
        <input type="number" id="stock" placeholder="Stock Quantity" class="w-full border rounded p-2 mb-3" required>
        <input type="text" id="icon" placeholder="Icon Emoji" class="w-full border rounded p-2 mb-3">
        <textarea id="description" placeholder="Description" rows="3" class="w-full border rounded p-2 mb-3"></textarea>
        <select id="active" class="w-full border rounded p-2 mb-4"><option value="true">Active</option><option value="false">Inactive</option></select>
        <div class="flex gap-3"><button type="button" onclick="closeProductModal()" class="flex-1 bg-gray-300 py-2 rounded">Cancel</button><button type="submit" class="flex-1 bg-[#ff9900] py-2 rounded font-semibold">Save</button></div>
      </form>
    </div>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      window.location.href = 'login.html';
    }
    
    let products = [];
    
    function loadProducts() {
      products = JSON.parse(localStorage.getItem('products') || '[]');
      const tbody = document.getElementById('productsTableBody');
      tbody.innerHTML = products.map(p => `
        <tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3">${p.sku}</td>
          <td class="px-6 py-3">${p.name}</td>
          <td class="px-6 py-3">$${p.price}</td>
          <td class="px-6 py-3">${p.stock}</td>
          <td class="px-6 py-3"><span class="${p.active ? 'text-green-600' : 'text-gray-400'}">${p.active ? 'Active' : 'Inactive'}</span></td>
          <td class="px-6 py-3"><button onclick="editProduct(${p.id})" class="text-blue-600 mr-3">Edit</button><button onclick="deleteProduct(${p.id})" class="text-red-600">Delete</button></td>
        </tr>
      `).join('');
    }
    
    function openProductModal() {
      document.getElementById('modalTitle').innerText = 'Add Product';
      document.getElementById('productForm').reset();
      document.getElementById('productId').value = '';
      document.getElementById('productModal').classList.remove('hidden');
      document.getElementById('productModal').classList.add('flex');
    }
    
    function closeProductModal() {
      document.getElementById('productModal').classList.add('hidden');
      document.getElementById('productModal').classList.remove('flex');
    }
    
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (product) {
        document.getElementById('modalTitle').innerText = 'Edit Product';
        document.getElementById('productId').value = product.id;
        document.getElementById('sku').value = product.sku;
        document.getElementById('name').value = product.name;
        document.getElementById('price').value = product.price;
        document.getElementById('stock').value = product.stock;
        document.getElementById('icon').value = product.icon || '';
        document.getElementById('description').value = product.description || '';
        document.getElementById('active').value = product.active;
        document.getElementById('productModal').classList.remove('hidden');
        document.getElementById('productModal').classList.add('flex');
      }
    }
    
    function saveProduct(event) {
      event.preventDefault();
      const id = document.getElementById('productId').value;
      const productData = {
        id: id ? parseInt(id) : Date.now(),
        sku: document.getElementById('sku').value,
        name: document.getElementById('name').value,
        price: parseFloat(document.getElementById('price').value),
        stock: parseInt(document.getElementById('stock').value),
        icon: document.getElementById('icon').value || '🌿',
        description: document.getElementById('description').value,
        active: document.getElementById('active').value === 'true',
        carbon: 0.3
      };
      
      if (id) {
        const index = products.findIndex(p => p.id === parseInt(id));
        if (index !== -1) products[index] = productData;
      } else {
        products.push(productData);
      }
      
      localStorage.setItem('products', JSON.stringify(products));
      closeProductModal();
      loadProducts();
      alert('Product saved successfully!');
    }
    
    function deleteProduct(id) {
      if (confirm('Delete this product?')) {
        products = products.filter(p => p.id !== id);
        localStorage.setItem('products', JSON.stringify(products));
        loadProducts();
      }
    }
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
    
    // Initialize sample data if empty
    if (!localStorage.getItem('products')) {
      const sampleProducts = [
        { id: 1, sku: 'BAM-001', name: 'Bamboo Utensil Set', price: 24.99, stock: 45, icon: '🎋', description: 'Eco-friendly bamboo utensils', active: true, carbon: 0.2 },
        { id: 2, sku: 'SOL-002', name: 'Solar Charger', price: 59.99, stock: 23, icon: '☀️', description: 'Portable solar charger', active: true, carbon: 1.1 },
        { id: 3, sku: 'ORG-003', name: 'Organic Cotton Tote', price: 19.99, stock: 89, icon: '👜', description: 'Reusable organic bag', active: true, carbon: 0.3 }
      ];
      localStorage.setItem('products', JSON.stringify(sampleProducts));
    }
    
    loadProducts();
  </script>
</body>
</html>
