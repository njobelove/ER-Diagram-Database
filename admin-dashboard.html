<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - EcoWise Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-100">

  <!-- Admin Header -->
  <div class="bg-[#131921] text-white">
    <div class="px-6 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <i class="fab fa-amazon text-2xl text-[#ff9900]"></i>
        <span class="font-bold text-lg">EcoWise Admin</span>
        <span class="text-xs bg-[#ff9900] text-black px-2 py-0.5 rounded-full">Seller Central</span>
      </div>
      <div class="flex items-center space-x-4">
        <span><i class="far fa-user-circle mr-1"></i> <span id="adminName">Admin</span></span>
        <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm hover:bg-red-700">Logout</button>
      </div>
    </div>
  </div>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-72 bg-white min-h-screen shadow-md">
      <nav class="p-4">
        <a href="admin-dashboard.html" class="flex items-center space-x-3 px-3 py-2 rounded-md bg-[#232f3e] text-white mb-1">
          <i class="fas fa-chart-line w-5"></i><span>Dashboard</span>
        </a>
        <a href="admin-products.html" class="flex items-center space-x-3 px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 mb-1">
          <i class="fas fa-box w-5"></i><span>Products</span>
        </a>
        <a href="admin-orders.html" class="flex items-center space-x-3 px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 mb-1">
          <i class="fas fa-truck w-5"></i><span>Orders</span>
        </a>
        <a href="admin-customers.html" class="flex items-center space-x-3 px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100 mb-1">
          <i class="fas fa-users w-5"></i><span>Customers</span>
        </a>
        <a href="admin-reports.html" class="flex items-center space-x-3 px-3 py-2 rounded-md text-gray-700 hover:bg-gray-100">
          <i class="fas fa-chart-bar w-5"></i><span>Reports</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      <h1 class="text-2xl font-bold mb-6">Dashboard Overview</h1>
      
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-start">
            <div><div class="text-gray-500 text-sm">Total Products</div><div id="totalProducts" class="text-3xl font-bold mt-1">0</div></div>
            <i class="fas fa-box text-3xl text-gray-400"></i>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-start">
            <div><div class="text-gray-500 text-sm">Total Orders</div><div id="totalOrders" class="text-3xl font-bold mt-1">0</div></div>
            <i class="fas fa-shopping-cart text-3xl text-gray-400"></i>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-start">
            <div><div class="text-gray-500 text-sm">Total Customers</div><div id="totalCustomers" class="text-3xl font-bold mt-1">0</div></div>
            <i class="fas fa-users text-3xl text-gray-400"></i>
          </div>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <div class="flex justify-between items-start">
            <div><div class="text-gray-500 text-sm">Revenue</div><div id="totalRevenue" class="text-3xl font-bold mt-1">$0</div></div>
            <i class="fas fa-dollar-sign text-3xl text-gray-400"></i>
          </div>
        </div>
      </div>

      <!-- Recent Orders & Low Stock -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="font-semibold text-lg mb-4">Recent Orders</h3>
          <div id="recentOrdersList" class="space-y-3"></div>
        </div>
        <div class="bg-white rounded-lg shadow p-6">
          <h3 class="font-semibold text-lg mb-4">Low Stock Alerts</h3>
          <div id="lowStockList" class="space-y-3"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Check admin authentication
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      window.location.href = 'login.html';
    }
    
    document.getElementById('adminName').innerText = localStorage.getItem('userName') || 'Admin';
    
    function loadDashboard() {
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      const customers = JSON.parse(localStorage.getItem('users') || '[]').filter(u => u.role !== 'admin');
      
      document.getElementById('totalProducts').innerText = products.length;
      document.getElementById('totalOrders').innerText = orders.length;
      document.getElementById('totalCustomers').innerText = customers.length;
      
      const revenue = orders.reduce((sum, o) => sum + o.total, 0);
      document.getElementById('totalRevenue').innerText = `$${revenue.toFixed(2)}`;
      
      // Recent Orders
      const recentOrders = orders.slice(-5).reverse();
      document.getElementById('recentOrdersList').innerHTML = recentOrders.map(o => `
        <div class="flex justify-between items-center border-b pb-2">
          <div><span class="font-medium">#${o.id}</span> - ${o.customerName}</div>
          <div><span class="text-green-600">$${o.total}</span> | <span class="text-sm">${o.status}</span></div>
        </div>
      `).join('') || '<p class="text-gray-500">No orders yet</p>';
      
      // Low Stock
      const lowStock = products.filter(p => p.stock < 10);
      document.getElementById('lowStockList').innerHTML = lowStock.map(p => `
        <div class="flex justify-between items-center border-b pb-2">
          <span>${p.name}</span>
          <span class="text-red-600 font-bold">Stock: ${p.stock}</span>
        </div>
      `).join('') || '<p class="text-gray-500">All products have good stock levels</p>';
    }
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userEmail');
      localStorage.removeItem('userName');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
    
    loadDashboard();
  </script>
</body>
</html>
