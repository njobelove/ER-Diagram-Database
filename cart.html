<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - EcoWise Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="bg-[#131921] text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="home.html" class="text-2xl font-bold hover:text-[#ff9900]">🌿 EcoWise</a>
      <a href="shop.html" class="hover:text-[#ff9900]">Continue Shopping</a>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">Shopping Cart</h1>
    <div id="cartItems" class="bg-white rounded-lg shadow"></div>
    <div id="cartSummary" class="mt-6 text-right"></div>
  </div>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const container = document.getElementById('cartItems');
      
      if (cart.length === 0) {
        container.innerHTML = '<div class="p-8 text-center text-gray-500">Your cart is empty. <a href="shop.html" class="text-green-600">Shop now</a></div>';
        document.getElementById('cartSummary').innerHTML = '';
        return;
      }
      
      let total = 0;
      container.innerHTML = cart.map(item => {
        total += item.price * item.quantity;
        return `
          <div class="flex justify-between items-center p-4 border-b">
            <div class="flex-1"><div class="text-3xl">${item.icon || '🌿'}</div><div class="font-semibold">${item.name}</div><div class="text-sm text-gray-500">$${item.price} each</div></div>
            <div class="flex items-center space-x-3"><button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" class="w-8 h-8 bg-gray-200 rounded">-</button><span class="w-8 text-center">${item.quantity}</span><button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" class="w-8 h-8 bg-gray-200 rounded">+</button></div>
            <div class="w-32 text-right font-bold">$${(item.price * item.quantity).toFixed(2)}</div>
            <button onclick="removeFromCart(${item.id})" class="text-red-500 ml-4"><i class="fas fa-trash"></i></button>
          </div>
        `;
      }).join('');
      
      document.getElementById('cartSummary').innerHTML = `
        <div class="bg-white rounded-lg shadow p-6 inline-block w-80">
          <div class="text-lg font-bold mb-4">Order Summary</div>
          <div class="flex justify-between mb-2"><span>Subtotal:</span><span>$${total.toFixed(2)}</span></div>
          <div class="flex justify-between mb-2"><span>Shipping:</span><span>Free</span></div>
          <div class="flex justify-between mb-4 border-t pt-2 font-bold"><span>Total:</span><span>$${total.toFixed(2)}</span></div>
          <button onclick="checkout()" class="w-full bg-[#ff9900] py-3 rounded font-semibold hover:bg-[#fa8900]">Proceed to Checkout</button>
        </div>
      `;
    }
    
    function updateQuantity(id, newQty) {
      if (newQty < 1) {
        removeFromCart(id);
        return;
      }
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const item = cart.find(i => i.id === id);
      if (item) item.quantity = newQty;
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }
    
    function removeFromCart(id) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart = cart.filter(i => i.id !== id);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }
    
    function checkout() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        alert('Your cart is empty');
        return;
      }
      
      const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
      if (!isLoggedIn) {
        if (confirm('Please login to checkout. Go to login page?')) {
          window.location.href = 'login.html';
        }
        return;
      }
      
      const total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
      const newOrder = {
        id: Date.now(),
        customerName: localStorage.getItem('userName'),
        date: new Date().toISOString().split('T')[0],
        total: total,
        status: 'Pending'
      };
      
      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      orders.unshift(newOrder);
      localStorage.setItem('orders', JSON.stringify(orders));
      localStorage.removeItem('cart');
      alert('Order placed successfully!');
      window.location.href = 'home.html';
    }
    
    loadCart();
  </script>
</body>
</html>
