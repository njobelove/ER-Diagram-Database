<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management - EcoWise Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="bg-[#131921] text-white px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3"><i class="fab fa-amazon text-2xl text-[#ff9900]"></i><span class="font-bold">EcoWise Admin</span></div>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
  </div>

  <div class="flex">
    <aside class="w-72 bg-white min-h-screen p-4 shadow">
      <a href="admin-dashboard.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Dashboard</a>
      <a href="admin-products.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Products</a>
      <a href="admin-orders.html" class="block px-3 py-2 rounded bg-[#232f3e] text-white">Orders</a>
      <a href="admin-customers.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Customers</a>
      <a href="admin-reports.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Reports</a>
    </aside>

    <main class="flex-1 p-8">
      <h1 class="text-2xl font-bold mb-6">Order Management</h1>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr><th class="px-6 py-3 text-left">Order ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      window.location.href = 'login.html';
    }
    
    let orders = [];
    
    function loadOrders() {
      orders = JSON.parse(localStorage.getItem('orders') || '[]');
      const tbody = document.getElementById('ordersTableBody');
      tbody.innerHTML = orders.map(o => `
        <tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3">#${o.id}</td>
          <td class="px-6 py-3">${o.customerName}</td>
          <td class="px-6 py-3">${o.date}</td>
          <td class="px-6 py-3">$${o.total}</td>
          <td class="px-6 py-3">
            <select onchange="updateOrderStatus(${o.id}, this.value)" class="border rounded p-1">
              <option ${o.status === 'Pending' ? 'selected' : ''}>Pending</option>
              <option ${o.status === 'Paid' ? 'selected' : ''}>Paid</option>
              <option ${o.status === 'Shipped' ? 'selected' : ''}>Shipped</option>
              <option ${o.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
              <option ${o.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
            </select>
          </td>
          <td class="px-6 py-3"><button onclick="viewOrder(${o.id})" class="text-blue-600">View</button></td>
        </tr>
      `).join('');
    }
    
    function updateOrderStatus(orderId, newStatus) {
      const index = orders.findIndex(o => o.id === orderId);
      if (index !== -1) {
        orders[index].status = newStatus;
        localStorage.setItem('orders', JSON.stringify(orders));
        alert(`Order #${orderId} updated to ${newStatus}`);
      }
    }
    
    function viewOrder(id) {
      const order = orders.find(o => o.id === id);
      alert(`Order Details:\nID: #${order.id}\nCustomer: ${order.customerName}\nTotal: $${order.total}\nStatus: ${order.status}\nDate: ${order.date}`);
    }
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
    
    // Initialize sample orders
    if (!localStorage.getItem('orders')) {
      const sampleOrders = [
        { id: 1001, customerName: 'Alice Johnson', date: '2025-04-07', total: 84.98, status: 'Paid' },
        { id: 1002, customerName: 'Bob Smith', date: '2025-04-06', total: 59.99, status: 'Shipped' },
        { id: 1003, customerName: 'Carol Davis', date: '2025-04-05', total: 44.97, status: 'Delivered' }
      ];
      localStorage.setItem('orders', JSON.stringify(sampleOrders));
    }
    
    loadOrders();
  </script>
</body>
</html>
