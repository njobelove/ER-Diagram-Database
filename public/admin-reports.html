<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - EcoWise Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="bg-[#131921] text-white px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3"><i class="fab fa-amazon text-2xl text-[#ff9900]"></i><span class="font-bold">EcoWise Admin</span></div>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
  </div>

  <div class="flex">
    <aside class="w-72 bg-white min-h-screen p-4 shadow">
      <a href="admin-dashboard.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Dashboard</a>
      <a href="admin-products.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Products</a>
      <a href="admin-orders.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Orders</a>
      <a href="admin-customers.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Customers</a>
      <a href="admin-reports.html" class="block px-3 py-2 rounded bg-[#232f3e] text-white">Reports</a>
    </aside>

    <main class="flex-1 p-8">
      <h1 class="text-2xl font-bold mb-6">Sales Reports</h1>
      
      <div class="bg-white rounded-lg shadow p-6">
        <div class="flex gap-3 mb-6">
          <button onclick="generateReport('daily')" class="bg-[#ff9900] px-4 py-2 rounded font-semibold">Daily Report</button>
          <button onclick="generateReport('weekly')" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Weekly Report</button>
          <button onclick="generateReport('monthly')" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Monthly Report</button>
          <button onclick="exportReport()" class="bg-green-600 text-white px-4 py-2 rounded"><i class="fas fa-download mr-1"></i> Export CSV</button>
        </div>
        <pre id="reportContent" class="bg-gray-50 p-4 rounded text-sm font-mono overflow-auto whitespace-pre-wrap"></pre>
      </div>
    </main>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      window.location.href = 'login.html';
    }
    
    function generateReport(type) {
      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      const totalRevenue = orders.reduce((sum, o) => sum + o.total, 0);
      const avgOrder = orders.length > 0 ? (totalRevenue / orders.length).toFixed(2) : 0;
      
      const report = `
╔══════════════════════════════════════════════════════════╗
║              ${type.toUpperCase()} SALES REPORT                         ║
╠══════════════════════════════════════════════════════════╣
║  Generated: ${new Date().toLocaleString()}
╠══════════════════════════════════════════════════════════╣
║  📊 KEY METRICS
║  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
║  Total Orders:     ${orders.length}
║  Total Revenue:    $${totalRevenue.toFixed(2)}
║  Average Order:    $${avgOrder}
║  Total Products:   ${products.length}
╠══════════════════════════════════════════════════════════╣
║  🏆 TOP PRODUCTS
║  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${products.slice(0, 3).map((p, i) => `║  ${i + 1}. ${p.name.padEnd(25)} $${p.price}`).join('\n')}
╠══════════════════════════════════════════════════════════╣
║  📈 ORDER STATUS BREAKDOWN
║  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${['Pending', 'Paid', 'Shipped', 'Delivered'].map(s => `║  ${s.padEnd(15)}: ${orders.filter(o => o.status === s).length}`).join('\n')}
╚══════════════════════════════════════════════════════════╝
      `;
      document.getElementById('reportContent').innerText = report;
    }
    
    function exportReport() {
      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      let csv = "Order ID,Customer Name,Date,Total,Status\n";
      orders.forEach(o => {
        csv += `${o.id},${o.customerName},${o.date},${o.total},${o.status}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `sales-report-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
    
    generateReport('daily');
  </script>
</body>
</html>
