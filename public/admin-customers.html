<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Management - EcoWise Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <div class="bg-[#131921] text-white px-6 py-3 flex justify-between items-center">
    <div class="flex items-center space-x-3"><i class="fab fa-amazon text-2xl text-[#ff9900]"></i><span class="font-bold">EcoWise Admin</span></div>
    <button onclick="logout()" class="bg-red-600 px-3 py-1 rounded text-sm">Logout</button>
  </div>

  <div class="flex">
    <aside class="w-72 bg-white min-h-screen p-4 shadow">
      <a href="admin-dashboard.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Dashboard</a>
      <a href="admin-products.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Products</a>
      <a href="admin-orders.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Orders</a>
      <a href="admin-customers.html" class="block px-3 py-2 rounded bg-[#232f3e] text-white">Customers</a>
      <a href="admin-reports.html" class="block px-3 py-2 rounded text-gray-700 hover:bg-gray-100">Reports</a>
    </aside>

    <main class="flex-1 p-8">
      <h1 class="text-2xl font-bold mb-6">Customer Management</h1>
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr><th class="px-6 py-3 text-left">Name</th><th>Email</th><th>Total Spent</th><th>Tier</th><th>Joined</th><th>Actions</th></tr>
          </thead>
          <tbody id="customersTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script>
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      window.location.href = 'login.html';
    }
    
    function loadCustomers() {
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const customers = users.filter(u => u.role !== 'admin');
      const tbody = document.getElementById('customersTableBody');
      tbody.innerHTML = customers.map(c => `
        <tr class="border-b hover:bg-gray-50">
          <td class="px-6 py-3">${c.name}</td>
          <td class="px-6 py-3">${c.email}</td>
          <td class="px-6 py-3">$${c.totalSpent || 0}</td>
          <td class="px-6 py-3"><span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs">${c.tier || 'Bronze'}</span></td>
          <td class="px-6 py-3">${c.createdAt ? new Date(c.createdAt).toLocaleDateString() : 'N/A'}</td>
          <td class="px-6 py-3"><button onclick="viewCustomer('${c.email}')" class="text-blue-600">View</button></td>
        </tr>
      `).join('');
    }
    
    function viewCustomer(email) {
      const users = JSON.parse(localStorage.getItem('users') || '[]');
      const customer = users.find(u => u.email === email);
      alert(`Customer Details:\nName: ${customer.name}\nEmail: ${customer.email}\nTier: ${customer.tier || 'Bronze'}\nTotal Spent: $${customer.totalSpent || 0}`);
    }
    
    function logout() {
      localStorage.removeItem('isLoggedIn');
      localStorage.removeItem('userRole');
      window.location.href = 'login.html';
    }
    
    loadCustomers();
  </script>
</body>
</html>
