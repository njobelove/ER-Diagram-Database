<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoWise Admin - Product Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --natural-green: #228B22;
      --forest-green: #2E8B57;
      --sage-green: #9CAF88;
    }
    .amazon-btn { background: linear-gradient(to bottom,#febd69,#f0a30a); }
    .amazon-btn:hover { background: linear-gradient(to bottom,#f7ca8f,#e2a32e); }
  </style>
</head>
<body class="bg-gray-100">

  <!-- Admin Navbar -->
  <header class="bg-gradient-to-r from-[#131921] to-[#1a2a36] text-white">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="text-xl font-bold">
          <span class="text-[#febd69]">eco</span>wise <span class="text-sm text-gray-400">Admin</span>
        </a>
      </div>
      <div class="flex items-center gap-4 text-sm">
        <a href="/" class="hover:text-[#228B22]"><i class="fas fa-home mr-1"></i> View Site</a>
        <span class="text-gray-500">|</span>
        <span class="text-[#228B22]"><i class="fas fa-box mr-1"></i> Products</span>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 py-8">
    
    <!-- Page Title -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-800">Product Management</h1>
      <p class="text-gray-600">Add, edit, and manage your product catalog</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-6 border-b border-gray-200">
      <button onclick="showTab('add')" id="tab-add" class="px-4 py-2 text-[#228B22] border-b-2 border-[#228B22] font-medium">
        <i class="fas fa-plus-circle mr-2"></i>Add Product
      </button>
      <button onclick="showTab('list')" id="tab-list" class="px-4 py-2 text-gray-600 hover:text-[#228B22]">
        <i class="fas fa-list mr-2"></i>Product List
      </button>
    </div>

    <!-- Add Product Form -->
    <div id="panel-add" class="bg-white rounded-lg shadow-lg p-6">
      <h2 class="text-lg font-bold mb-4 text-gray-800">Add New Product</h2>
      
      <form id="productForm" class="space-y-6">
        <!-- Basic Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Product Name *</label>
            <input type="text" id="productName" required placeholder="e.g., Organic Bamboo Towels"
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">SKU (Stock Keeping Unit)</label>
            <input type="text" id="productSku" placeholder="e.g., ECO-001"
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none">
          </div>
        </div>

        <!-- Price and Category -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Base Price ($) *</label>
            <input type="number" id="productPrice" step="0.01" min="0" required placeholder="0.00"
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
            <select id="productCategory" required
              class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none">
              <option value="">Select a category</option>
              <!-- Categories loaded dynamically -->
            </select>
          </div>
        </div>

        <!-- Product Image URL -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Product Image URL</label>
          <div class="flex gap-2">
            <input type="url" id="productImage" placeholder="https://example.com/image.jpg"
              class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none">
            <button type="button" onclick="previewImage()" class="px-4 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200">
              Preview
            </button>
          </div>
          <p class="text-xs text-gray-500 mt-1">Enter a URL for the product image (jpg, png, webp)</p>
          
          <!-- Image Preview -->
          <div id="imagePreview" class="mt-3 hidden">
            <img id="previewImg" src="" alt="Product preview" class="w-48 h-48 object-cover rounded-lg border border-gray-200">
          </div>
        </div>

        <!-- Product Description -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="productDesc" rows="3" placeholder="Describe your product..."
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-[#228B22] focus:border-[#228B22] outline-none"></textarea>
        </div>

        <!-- Active Status -->
        <div class="flex items-center gap-3">
          <input type="checkbox" id="productActive" checked
            class="w-4 h-4 text-[#228B22] border-gray-300 rounded focus:ring-[#228B22]">
          <label for="productActive" class="text-sm text-gray-700">Product is active and visible on the store</label>
        </div>

        <!-- Submit Buttons -->
        <div class="flex gap-3 pt-4">
          <button type="submit" class="amazon-btn px-6 py-2.5 rounded-md text-sm font-bold text-black">
            <i class="fas fa-save mr-2"></i>Save Product
          </button>
          <button type="reset" class="px-6 py-2.5 border border-gray-300 rounded-md text-sm hover:bg-gray-50">
            Clear Form
          </button>
        </div>
      </form>

      <!-- Success/Error Message -->
      <div id="messageBox" class="mt-4 hidden p-4 rounded-md"></div>
    </div>

    <!-- Product List Panel -->
    <div id="panel-list" class="hidden bg-white rounded-lg shadow-lg p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-gray-800">All Products</h2>
        <div class="flex gap-2">
          <input type="text" id="searchProducts" placeholder="Search products..."
            class="px-4 py-2 border border-gray-300 rounded-md focus:ring-[#228B22] focus:border-[#228B22] outline-none text-sm">
          <button onclick="loadProducts()" class="px-4 py-2 bg-[#228B22] text-white rounded-md hover:bg-[#1e7a1e]">
            <i class="fas fa-search"></i>
          </button>
        </div>
      </div>

      <!-- Products Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-4 py-3 text-left font-medium text-gray-600">ID</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Image</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Product Name</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">SKU</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Category</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Price</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Status</th>
              <th class="px-4 py-3 text-left font-medium text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <!-- Products loaded dynamically -->
            <tr>
              <td colspan="8" class="px-4 py-8 text-center text-gray-500">Loading products...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- JavaScript -->
  <script>
    // ============================================
    // TAB SWITCHING
    // ============================================
    function showTab(tab) {
      const addPanel = document.getElementById('panel-add');
      const listPanel = document.getElementById('panel-list');
      const addTab = document.getElementById('tab-add');
      const listTab = document.getElementById('tab-list');

      if (tab === 'add') {
        addPanel.classList.remove('hidden');
        listPanel.classList.add('hidden');
        addTab.classList.add('text-[#228B22]', 'border-b-2', 'border-[#228B22]');
        addTab.classList.remove('text-gray-600');
        listTab.classList.remove('text-[#228B22]', 'border-b-2', 'border-[#228B22]');
        listTab.classList.add('text-gray-600');
      } else {
        addPanel.classList.add('hidden');
        listPanel.classList.remove('hidden');
        listTab.classList.add('text-[#228B22]', 'border-b-2', 'border-[#228B22]');
        listTab.classList.remove('text-gray-600');
        addTab.classList.remove('text-[#228B22]', 'border-b-2', 'border-[#228B22]');
        addTab.classList.add('text-gray-600');
        loadProducts(); // Load products when switching to list tab
      }
    }

    // ============================================
    // LOAD CATEGORIES FOR DROPDOWN
    // ============================================
    async function loadCategories() {
      try {
        const res = await fetch('/api/categories');
        const categories = await res.json();
        
        const select = document.getElementById('productCategory');
        select.innerHTML = '<option value="">Select a category</option>';
        
        categories.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat.category_id;
          option.textContent = cat.category_name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error loading categories:', err);
      }
    }

    // ============================================
    // IMAGE PREVIEW
    // ============================================
    function previewImage() {
      const url = document.getElementById('productImage').value;
      const preview = document.getElementById('imagePreview');
      const img = document.getElementById('previewImg');

      if (url) {
        img.src = url;
        preview.classList.remove('hidden');
      } else {
        preview.classList.add('hidden');
      }
    }

    // ============================================
    // SHOW MESSAGE (SUCCESS/ERROR)
    // ============================================
    function showMessage(message, isSuccess) {
      const box = document.getElementById('messageBox');
      box.textContent = message;
      box.className = isSuccess 
        ? 'mt-4 p-4 rounded-md bg-green-100 text-green-800 border border-green-200'
        : 'mt-4 p-4 rounded-md bg-red-100 text-red-800 border border-red-200';
      box.classList.remove('hidden');
      
      // Auto-hide after 5 seconds
      setTimeout(() => box.classList.add('hidden'), 5000);
    }

    // ============================================
    // SUBMIT NEW PRODUCT
    // ============================================
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Gather form data
      const productData = {
        product_name: document.getElementById('productName').value,
        sku: document.getElementById('productSku').value || null,
        base_price: parseFloat(document.getElementById('productPrice').value),
        category_id: parseInt(document.getElementById('productCategory').value),
        is_active: document.getElementById('productActive').checked,
        image_url: document.getElementById('productImage').value || null,
        description: document.getElementById('productDesc').value || null
      };

      try {
        const res = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(productData)
        });

        const result = await res.json();

        if (res.ok) {
          showMessage('Product added successfully! It will now appear on the home page.', true);
          document.getElementById('productForm').reset();
          document.getElementById('imagePreview').classList.add('hidden');
        } else {
          showMessage('Error: ' + result.error, false);
        }
      } catch (err) {
        showMessage('Failed to add product: ' + err.message, false);
      }
    });

    // ============================================
    // LOAD ALL PRODUCTS (FOR LIST VIEW)
    // ============================================
    async function loadProducts() {
      try {
        // Get products
        const productsRes = await fetch('/api/products');
        const products = await productsRes.json();

        // Get categories
        const categoriesRes = await fetch('/api/categories');
        const categories = await categoriesRes.json();

        // Create category map for easy lookup
        const categoryMap = {};
        categories.forEach(c => categoryMap[c.category_id] = c.category_name);

        // Get product images
        const imagesRes = await fetch('/api/product-images');
        const images = await imagesRes.json();

        // Create image map (product_id -> primary image URL)
        const imageMap = {};
        images.forEach(img => {
          if (img.is_primary === 'true' || img.is_primary === true) {
            imageMap[img.product_id] = img.image_url;
          }
        });

        // Render table
        const tbody = document.getElementById('productsTableBody');
        
        if (products.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-500">No products found. Add your first product!</td></tr>';
          return;
        }

        tbody.innerHTML = products.map(p => {
          const imageUrl = imageMap[p.product_id] || 'https://via.placeholder.com/80?text=No+Image';
          const categoryName = categoryMap[p.category_id] || 'Uncategorized';
          const statusClass = p.is_active 
            ? 'bg-green-100 text-green-800' 
            : 'bg-gray-100 text-gray-600';

          return `
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="px-4 py-3">${p.product_id}</td>
              <td class="px-4 py-3">
                <img src="${imageUrl}" alt="${p.product_name}" class="w-12 h-12 object-cover rounded">
              </td>
              <td class="px-4 py-3 font-medium">${p.product_name}</td>
              <td class="px-4 py-3 text-gray-600">${p.sku || '-'}</td>
              <td class="px-4 py-3 text-gray-600">${categoryName}</td>
              <td class="px-4 py-3 font-bold text-[#228B22]">$${parseFloat(p.base_price).toFixed(2)}</td>
              <td class="px-4 py-3">
                <span class="px-2 py-1 rounded-full text-xs font-medium ${statusClass}">
                  ${p.is_active ? 'Active' : 'Inactive'}
                </span>
              </td>
              <td class="px-4 py-3">
                <button onclick="deleteProduct(${p.product_id})" class="text-red-500 hover:text-red-700">
                  <i class="fas fa-trash"></i>
                </button>
              </td>
            </tr>
          `;
        }).join('');

      } catch (err) {
        console.error('Error loading products:', err);
        document.getElementById('productsTableBody').innerHTML = 
          '<tr><td colspan="8" class="px-4 py-8 text-center text-red-500">Error loading products</td></tr>';
      }
    }

    // ============================================
    // DELETE PRODUCT
    // ============================================
    async function deleteProduct(productId) {
      if (!confirm('Are you sure you want to delete this product?')) return;

      try {
        const res = await fetch(`/api/products/${productId}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          loadProducts(); // Reload the list
          alert('Product deleted successfully');
        } else {
          alert('Failed to delete product');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    // Check admin role
    if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('userRole') !== 'admin') {
      localStorage.setItem('redirectAfterLogin', '/admin.html');
      window.location.href = 'login.html';
    }
    
    window.addEventListener('load', () => {
      loadCategories();
    });
  </script>
</body>
</html>
