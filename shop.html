<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - EcoWise Market</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100">

  <!-- Navigation -->
  <div class="bg-[#131921] text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="home.html" class="text-2xl font-bold hover:text-[#ff9900]">🌿 EcoWise</a>
      <div class="flex items-center space-x-4">
        <a href="cart.html" class="relative"><i class="fas fa-shopping-cart text-xl"></i><span id="cartCount" class="absolute -top-2 -right-3 bg-[#ff9900] text-black rounded-full px-1 text-xs">0</span></a>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-6">All Products</h1>
    <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </div>

  <script>
    function loadCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cartCount').innerText = count;
    }
    
    function loadProducts() {
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = products.map(p => `
        <div class="bg-white rounded-lg shadow-md p-4 hover:shadow-lg transition cursor-pointer" onclick="viewProduct(${p.id})">
          <div class="text-6xl text-center mb-3">${p.icon || '🌿'}</div>
          <h3 class="font-semibold text-lg">${p.name}</h3>
          <p class="text-gray-600 text-sm mt-1">${p.description || ''}</p>
          <div class="flex justify-between items-center mt-3">
            <span class="text-xl font-bold text-green-700">$${p.price}</span>
            <span class="text-xs bg-green-100 text-green-800 px-2 py-1 rounded">🌱 ${p.carbon || 0.2} kg CO₂</span>
          </div>
          <button class="w-full mt-3 bg-[#ff9900] text-black py-2 rounded hover:bg-[#fa8900]" onclick="event.stopPropagation(); addToCart(${p.id})">Add to Cart</button>
        </div>
      `).join('');
    }
    
    function viewProduct(id) {
      window.location.href = `product-detail.html?id=${id}`;
    }
    
    function addToCart(productId) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const products = JSON.parse(localStorage.getItem('products') || '[]');
      const product = products.find(p => p.id === productId);
      const existing = cart.find(item => item.id === productId);
      
      if (existing) {
        existing.quantity++;
      } else if (product) {
        cart.push({ ...product, quantity: 1 });
      }
      
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCartCount();
      alert('Added to cart!');
    }
    
    loadProducts();
    loadCartCount();
  </script>
</body>
</html>
